<!DOCTYPE html>
<html>
<head> 

    <link rel="stylesheet" href="style.css">
    
    <title>Barber Alerta</title>
      
</head>

<body>
    <h1>Barber Alerta</h1>

    <p>Um jeito <b>simples</b> e <b>objetivo</b> de marcar com seu cliente e nao ter problemas de <b>comunicacao</b> !</p>

    <form>
    <p>Nome</p>
    <input placeholder="Digite seu nome" type="text">
    <p>Telefone</p>
    <input placeholder="Digite seu telefone" type="tel">

    <p>Servico</p>
    <select>
        <option>Escolha um servico</option>
    
        <option>Corte</option>
        <option>Barba</option>  
        <option>Corte e Barba</option>
    </select>
    <p>Data</p>
    <input type="date">
    <p>Horario</p>
    <input type="time">

    <p>Observacao</p>
    <textarea placeholder="Digite uma observacao"></textarea>


    <button>
        Agendar Horario
    </button>


    </form>

</body>

</html>
